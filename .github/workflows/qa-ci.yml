name: QA Sentinel CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v4
    
    - name: Install pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 8

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install

    - name: Build Core
      run: pnpm --filter @qa/core run build

    - name: Run Unit Tests
      run: pnpm test

    - name: Install Playwright Browsers
      run: pnpm exec playwright install --with-deps

    - name: Run E2E Tests
      run: pnpm --filter @qa/backend start & sleep 5 && pnpm exec playwright test
